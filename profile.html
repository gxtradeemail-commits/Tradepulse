<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="theme-color" content="#060d1a">
<title>TradePulse — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060d1a;font-family:"DM Sans",sans-serif;color:#f1f5f9;min-height:100vh;padding-bottom:80px}
h2,h3{font-family:"Syne",sans-serif}.mono{font-family:"DM Mono",monospace}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px;display:flex;align-items:center;gap:12px}
.page{padding:70px 14px 12px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:12px}
.btn{width:100%;padding:17px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;text-decoration:none}
.btn-green{background:#059669;color:white}.btn-green:active{background:#10b981}.btn-green:disabled{opacity:.5}
.btn-ghost{background:rgba(255,255,255,.06);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}
.input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;color:white;font-size:16px;outline:none;font-family:"DM Sans",sans-serif}
.input:focus{border-color:#10b981}.input::placeholder{color:#334155}
.label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:8px}
.field{margin-bottom:14px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-row:last-child{border-bottom:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;text-decoration:none;color:#334155;font-size:10px;font-weight:500}
.nav-item.active{color:#10b981}
.hidden{display:none!important}
#toast-wrap{position:fixed;top:74px;left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1px solid;font-size:14px;transform:translateY(-8px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.toast-error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
.toast-warning{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d}
.toast-info{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#93c5fd}
.av-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;transition:all .2s;border:2px solid transparent} .av-dot.sel{border-color:white;transform:scale(1.15)}
</style>
</head><body>
<div class="topbar">
  <a href="dashboard.html" style="color:#64748b;display:flex;align-items:center"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></a>
  <h2 style="font-size:18px;font-weight:700;flex:1">Profile</h2>
</div>
<div class="page">
  <div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
    <div id="av-big" style="width:62px;height:62px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white;font-family:'Syne',sans-serif;flex-shrink:0"></div>
    <div>
      <p style="font-size:18px;font-weight:700" id="p-name">—</p>
      <p style="font-size:13px;color:#64748b;margin-top:2px" id="p-email">—</p>
      <p class="mono" style="color:#10b981;font-size:15px;font-weight:700;margin-top:4px" id="p-bal">$0.00</p>
    </div>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Personal Info</h3>
    <div class="field"><label class="label">Full name</label><input id="e-name" type="text" class="input" placeholder="Your name"></div>
    <div class="field"><label class="label">Phone</label><input id="e-phone" type="tel" class="input" placeholder="+234..." inputmode="tel"></div>
    <button class="btn btn-green" onclick="saveProfile()">Save Changes</button>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Avatar Color</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px" id="av-colors"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(255,255,255,.06)">
      <span style="font-size:14px;color:#e2e8f0">Email notifications</span>
      <input type="checkbox" id="notif-tog" style="width:22px;height:22px;accent-color:#10b981">
    </div>
    <button class="btn" style="background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.2);margin-top:12px" onclick="saveAppearance()">Save Appearance</button>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Change Password</h3>
    <div class="field"><label class="label">Current password</label><input id="cur-pw" type="password" class="input" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="field"><label class="label">New password</label><input id="new-pw" type="password" class="input" placeholder="Min. 6 chars" autocomplete="new-password"></div>
    <div class="field"><label class="label">Confirm new password</label><input id="cnf-pw" type="password" class="input" placeholder="Repeat new" autocomplete="new-password"></div>
    <button class="btn" style="background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)" onclick="changePw()">Update Password</button>
  </div>

  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">Account Info</h3>
    <div class="stat-row"><span style="color:#64748b;font-size:14px">User ID</span><span class="mono" style="font-size:12px" id="a-uid">—</span></div>
    <div class="stat-row"><span style="color:#64748b;font-size:14px">Country</span><span style="font-size:14px" id="a-country">—</span></div>
    <div class="stat-row"><span style="color:#64748b;font-size:14px">Currency</span><span class="mono" style="font-size:14px" id="a-curr">—</span></div>
    <div class="stat-row"><span style="color:#64748b;font-size:14px">Referral code</span><span class="mono" style="color:#10b981;font-weight:700" id="a-ref">—</span></div>
  </div>

  <div class="card">
    <a href="referrals.html" style="display:flex;align-items:center;justify-content:space-between;text-decoration:none;padding:4px 0">
      <div style="display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;background:rgba(16,185,129,.1);border-radius:10px;display:flex;align-items:center;justify-content:center"><i data-lucide="users" style="width:18px;height:18px;color:#10b981"></i></div><p style="font-size:14px;font-weight:500">Referrals</p></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#334155"></i>
    </a>
    <div style="border-top:1px solid rgba(255,255,255,.06);margin:12px 0"></div>
    <a href="reports.html" style="display:flex;align-items:center;justify-content:space-between;text-decoration:none;padding:4px 0">
      <div style="display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;background:rgba(96,165,250,.1);border-radius:10px;display:flex;align-items:center;justify-content:center"><i data-lucide="bar-chart-2" style="width:18px;height:18px;color:#60a5fa"></i></div><p style="font-size:14px;font-weight:500">Reports</p></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#334155"></i>
    </a>
    <div style="border-top:1px solid rgba(255,255,255,.06);margin:12px 0"></div>
    <button onclick="doLogout()" style="display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;cursor:pointer;padding:4px 0">
      <div style="width:38px;height:38px;background:rgba(239,68,68,.08);border-radius:10px;display:flex;align-items:center;justify-content:center"><i data-lucide="log-out" style="width:18px;height:18px;color:#ef4444"></i></div>
      <p style="font-size:14px;font-weight:500;color:#ef4444;font-family:'DM Sans',sans-serif">Logout</p>
    </button>
  </div>
</div>
<nav class="bottom-nav"><a href="dashboard.html" class="nav-item"><i data-lucide="home" style="width:22px;height:22px"></i><span>Home</span></a><a href="vault.html" class="nav-item"><i data-lucide="vault" style="width:22px;height:22px"></i><span>Vault</span></a><a href="deposit.html" class="nav-item"><div style="width:46px;height:46px;background:#059669;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:2px;margin-top:-18px;border:3px solid #060d1a"><i data-lucide="plus" style="width:22px;height:22px;color:white"></i></div><span>Deposit</span></a><a href="transactions.html" class="nav-item"><i data-lucide="list" style="width:22px;height:22px"></i><span>History</span></a><a href="profile.html" class="nav-item active"><i data-lucide="user" style="width:22px;height:22px"></i><span>Profile</span></a></nav>
<div id="toast-wrap"></div>
<script>

const API='https://script.google.com/macros/s/AKfycbzOh7BafxwXSmNNNn01pu-KtdXoLKqzxMiZxXsc-ETf1p7URqMooz4D1WhsgN2CjOpx/exec';
let _sess=null;
function getS(){try{return JSON.parse(sessionStorage.getItem('tp_s')||'null');}catch{return null;}}
_sess=getS();if(!_sess?.t)location.href='index.html';
async function api(a,p={}){const url=new URL(API);url.searchParams.set('action',a);url.searchParams.set('token',_sess.t);Object.entries(p).forEach(([k,v])=>url.searchParams.set(k,v));try{return await(await fetch(url)).json();}catch{return{success:false};}}
async function post(a,b){try{return await(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:a,token:_sess.t,...b})})).json();}catch{return{success:false,error:'Network error'};}}
function fmt(n,d=2){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDT(s){if(!s)return'—';return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtD(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(m,t='info',d=4000){const w=document.getElementById('toast-wrap');const el=document.createElement('div');el.className=`toast toast-${t}`;const ic={success:'check-circle',error:'x-circle',warning:'alert-triangle',info:'info'}[t];el.innerHTML=`<i data-lucide="${ic}" style="width:16px;height:16px;flex-shrink:0"></i><span>${m}</span>`;w.appendChild(el);lucide.createIcons({nodes:[el]});requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},d);}

const COLS=['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316'];
let _selCol='#10b981',_user=null;
async function init(){
  const r=await api('getUser');if(!r.success){location.href='index.html';return;}
  _user=r.user;const u=_user;
  const ini=(u.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  _selCol=u.avatarColor||'#10b981';
  document.getElementById('av-big').textContent=ini;document.getElementById('av-big').style.background=_selCol;
  document.getElementById('p-name').textContent=u.name||'—';document.getElementById('p-email').textContent=u.email||'—';document.getElementById('p-bal').textContent='$'+fmt(u.walletBalance||0);
  document.getElementById('e-name').value=u.name||'';document.getElementById('e-phone').value=u.phone||'';
  document.getElementById('notif-tog').checked=u.notifEmailEnabled!==false;
  document.getElementById('a-uid').textContent=(u.userId||'').slice(0,16);document.getElementById('a-country').textContent=u.country||'—';document.getElementById('a-curr').textContent=u.currencyCode||'—';document.getElementById('a-ref').textContent=u.referralCode||'—';
  renderColors();lucide.createIcons();
}
function renderColors(){document.getElementById('av-colors').innerHTML=COLS.map(c=>`<div class="av-dot ${c===_selCol?'sel':''}" style="background:${c}" onclick="pickCol('${c}')"></div>`).join('');}
function pickCol(c){_selCol=c;renderColors();}
async function saveProfile(){
  const r=await post('updateProfile',{name:document.getElementById('e-name').value.trim(),phone:document.getElementById('e-phone').value.trim()});
  if(!r.success){toast(r.error||'Failed','error');return;}
  toast('Profile saved!','success');init();
}
async function saveAppearance(){
  const r=await post('updateProfile',{avatarColor:_selCol,notifEmailEnabled:document.getElementById('notif-tog').checked});
  if(!r.success){toast(r.error||'Failed','error');return;}
  toast('Appearance saved!','success');
  document.getElementById('av-big').style.background=_selCol;
}
async function changePw(){
  const c=document.getElementById('cur-pw').value,n=document.getElementById('new-pw').value,cf=document.getElementById('cnf-pw').value;
  if(!c||!n||!cf){toast('Fill all fields','warning');return;}
  if(n!==cf){toast('Passwords do not match','error');return;}
  if(n.length<6){toast('Min 6 characters','error');return;}
  const r=await post('changePassword',{oldPassword:c,newPassword:n});
  if(!r.success){toast(r.error||'Failed','error');return;}
  toast('Password updated!','success');
  document.getElementById('cur-pw').value='';document.getElementById('new-pw').value='';document.getElementById('cnf-pw').value='';
}
async function doLogout(){await post('logout',{});sessionStorage.removeItem('tp_s');location.href='index.html';}
init();
</script></body></html>
