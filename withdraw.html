<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="theme-color" content="#060d1a">
<title>TradePulse — Withdraw</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060d1a;font-family:"DM Sans",sans-serif;color:#f1f5f9;min-height:100vh;padding-bottom:80px}
h2,h3{font-family:"Syne",sans-serif}.mono{font-family:"DM Mono",monospace}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px;display:flex;align-items:center;gap:12px}
.page{padding:70px 14px 12px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:12px}
.btn{width:100%;padding:17px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;text-decoration:none}
.btn-green{background:#059669;color:white}.btn-green:active{background:#10b981}.btn-green:disabled{opacity:.5}
.btn-ghost{background:rgba(255,255,255,.06);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}
.input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;color:white;font-size:16px;outline:none;font-family:"DM Sans",sans-serif}
.input:focus{border-color:#10b981}.input::placeholder{color:#334155}
.label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:8px}
.field{margin-bottom:14px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-row:last-child{border-bottom:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;text-decoration:none;color:#334155;font-size:10px;font-weight:500}
.nav-item.active{color:#10b981}
.hidden{display:none!important}
#toast-wrap{position:fixed;top:74px;left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1px solid;font-size:14px;transform:translateY(-8px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.toast-error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
.toast-warning{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d}
.toast-info{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#93c5fd}

</style>
</head><body>
<div class="topbar">
  <a href="dashboard.html" style="color:#64748b;display:flex;align-items:center"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></a>
  <h2 style="font-size:18px;font-weight:700;flex:1">Withdraw</h2>
</div>
<div class="page">
  <div id="avail-banner" class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:12px">
      <div id="ban-icon" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
      <div style="flex:1"><p style="font-weight:600;font-size:15px" id="ban-title">Checking...</p><p style="font-size:13px;color:#64748b;margin-top:3px" id="ban-desc"></p></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)">
      <div><p style="font-size:11px;color:#64748b">Available</p><p class="mono" style="font-size:20px;font-weight:700;color:white" id="avail-bal">$0.00</p></div>
      <div style="text-align:right"><p style="font-size:11px;color:#64748b">Min amount</p><p class="mono" style="font-size:14px;font-weight:600;color:#94a3b8" id="min-wd-disp">$10</p></div>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Withdrawal Details</h3>
    <div class="field"><label class="label">Amount (USD) *</label>
      <div style="position:relative"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-family:'DM Mono',monospace">$</span><input id="wd-amt" type="number" class="input" style="padding-left:28px" placeholder="0.00" oninput="chkLarge()" inputmode="decimal"></div>
    </div>
    <div class="field"><label class="label">Bank Name *</label><input id="wd-bank" type="text" class="input" placeholder="e.g. First Bank"></div>
    <div class="field"><label class="label">Account Number *</label><input id="wd-acc" type="text" class="input" placeholder="0123456789" inputmode="numeric"></div>
    <div class="field"><label class="label">Account Name *</label><input id="wd-name" type="text" class="input" placeholder="As shown on account"></div>
    <div id="confirm-gate" class="hidden" style="padding:14px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:12px;margin-bottom:14px">
      <p style="color:#fca5a5;font-size:13px;margin-bottom:8px">Large withdrawal — type <strong>CONFIRM</strong> to proceed:</p>
      <input id="confirm-txt" type="text" class="input" style="font-size:16px;font-weight:700;letter-spacing:2px" placeholder="CONFIRM" autocomplete="off">
    </div>
    <button class="btn btn-green" id="wd-btn" onclick="doWithdraw()" disabled>Request Withdrawal</button>
  </div>
</div>
<nav class="bottom-nav"><a href="dashboard.html" class="nav-item active"><i data-lucide="home" style="width:22px;height:22px"></i><span>Home</span></a><a href="vault.html" class="nav-item"><i data-lucide="vault" style="width:22px;height:22px"></i><span>Vault</span></a><a href="deposit.html" class="nav-item"><div style="width:46px;height:46px;background:#059669;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:2px;margin-top:-18px;border:3px solid #060d1a"><i data-lucide="plus" style="width:22px;height:22px;color:white"></i></div><span>Deposit</span></a><a href="transactions.html" class="nav-item"><i data-lucide="list" style="width:22px;height:22px"></i><span>History</span></a><a href="profile.html" class="nav-item"><i data-lucide="user" style="width:22px;height:22px"></i><span>Profile</span></a></nav>
<div id="toast-wrap"></div>
<script>

const API='https://script.google.com/macros/s/AKfycbzOh7BafxwXSmNNNn01pu-KtdXoLKqzxMiZxXsc-ETf1p7URqMooz4D1WhsgN2CjOpx/exec';
let _sess=null;
function getS(){try{return JSON.parse(sessionStorage.getItem('tp_s')||'null');}catch{return null;}}
_sess=getS();if(!_sess?.t)location.href='index.html';
async function api(a,p={}){const url=new URL(API);url.searchParams.set('action',a);url.searchParams.set('token',_sess.t);Object.entries(p).forEach(([k,v])=>url.searchParams.set(k,v));try{return await(await fetch(url)).json();}catch{return{success:false};}}
async function post(a,b){try{return await(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:a,token:_sess.t,...b})})).json();}catch{return{success:false,error:'Network error'};}}
function fmt(n,d=2){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDT(s){if(!s)return'—';return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtD(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(m,t='info',d=4000){const w=document.getElementById('toast-wrap');const el=document.createElement('div');el.className=`toast toast-${t}`;const ic={success:'check-circle',error:'x-circle',warning:'alert-triangle',info:'info'}[t];el.innerHTML=`<i data-lucide="${ic}" style="width:16px;height:16px;flex-shrink:0"></i><span>${m}</span>`;w.appendChild(el);lucide.createIcons({nodes:[el]});requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},d);}

let _canWd=false,_balance=0,_minWd=10,_largeThr=500;
async function init(){
  const[ud,cfg]=await Promise.all([api('getUser'),api('getConfig')]);
  if(!ud.success){location.href='index.html';return;}
  _balance=parseFloat(ud.user?.walletBalance||0);
  document.getElementById('avail-bal').textContent='$'+fmt(_balance);
  if(cfg.success){
    const c=cfg.config;_minWd=c.minWithdrawalUSD||10;_largeThr=c.largeWithdrawalThreshold||500;
    document.getElementById('min-wd-disp').textContent='$'+_minWd;
    const today=new Date().toLocaleDateString('en-US',{weekday:'long'});
    const d1=c.withdrawalDay1||'Saturday',d2=c.withdrawalDay2||'Sunday';
    _canWd=today===d1||today===d2;
    const icon=document.getElementById('ban-icon');
    if(_canWd){
      icon.style.background='rgba(16,185,129,.1)';icon.innerHTML='<i data-lucide="lock-open" style="width:22px;height:22px;color:#10b981"></i>';
      document.getElementById('ban-title').textContent='Withdrawals Open';document.getElementById('ban-title').style.color='#10b981';
      document.getElementById('ban-desc').textContent='Window open today ('+today+'). Processed within 24 hours.';
      enableForm(true);
    } else {
      icon.style.background='rgba(245,158,11,.1)';icon.innerHTML='<i data-lucide="lock" style="width:22px;height:22px;color:#f59e0b"></i>';
      document.getElementById('ban-title').textContent='Withdrawals Closed';document.getElementById('ban-title').style.color='#f59e0b';
      const nxt=new Date();let diff=([d1=='Sunday'?0:d1=='Monday'?1:d1=='Tuesday'?2:d1=='Wednesday'?3:d1=='Thursday'?4:d1=='Friday'?5:6]-nxt.getDay()+7)%7||7;nxt.setDate(nxt.getDate()+diff);
      document.getElementById('ban-desc').textContent='Opens '+d1+' & '+d2+'. Next: '+nxt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    }
  }
  lucide.createIcons();
}
function enableForm(e){['wd-amt','wd-bank','wd-acc','wd-name'].forEach(id=>document.getElementById(id).disabled=!e);if(!e)document.getElementById('wd-btn').disabled=true;}
function chkLarge(){
  const a=parseFloat(document.getElementById('wd-amt').value)||0;
  const lg=a>=_largeThr;document.getElementById('confirm-gate').classList.toggle('hidden',!lg);
  const ok=!lg||document.getElementById('confirm-txt').value==='CONFIRM';
  document.getElementById('wd-btn').disabled=!_canWd||a<_minWd||a>_balance||!ok;
}
document.getElementById('confirm-txt')?.addEventListener('input',chkLarge);
async function doWithdraw(){
  const a=parseFloat(document.getElementById('wd-amt').value)||0;
  const bank=document.getElementById('wd-bank').value.trim();
  const acc=document.getElementById('wd-acc').value.trim();
  const nm=document.getElementById('wd-name').value.trim();
  if(!bank||!acc||!nm){toast('Fill all bank details','warning');return;}
  const btn=document.getElementById('wd-btn');btn.disabled=true;btn.textContent='Submitting...';
  const r=await post('requestWithdrawal',{amount:a,bankName:bank,accountNumber:acc,accountName:nm});
  btn.disabled=false;btn.textContent='Request Withdrawal';
  if(!r.success){toast(r.error||'Failed','error');btn.disabled=false;return;}
  toast('Withdrawal request submitted!','success');
  document.getElementById('wd-amt').value='';document.getElementById('wd-bank').value='';document.getElementById('wd-acc').value='';document.getElementById('wd-name').value='';
  init();
}
init();
</script></body></html>
