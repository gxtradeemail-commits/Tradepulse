<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="theme-color" content="#060d1a">
<title>TradePulse — Transactions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060d1a;font-family:"DM Sans",sans-serif;color:#f1f5f9;min-height:100vh;padding-bottom:80px}
h2,h3{font-family:"Syne",sans-serif}.mono{font-family:"DM Mono",monospace}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px;display:flex;align-items:center;gap:12px}
.page{padding:70px 14px 12px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:12px}
.btn{width:100%;padding:17px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;text-decoration:none}
.btn-green{background:#059669;color:white}.btn-green:active{background:#10b981}.btn-green:disabled{opacity:.5}
.btn-ghost{background:rgba(255,255,255,.06);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}
.input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;color:white;font-size:16px;outline:none;font-family:"DM Sans",sans-serif}
.input:focus{border-color:#10b981}.input::placeholder{color:#334155}
.label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:8px}
.field{margin-bottom:14px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-row:last-child{border-bottom:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,13,26,.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;text-decoration:none;color:#334155;font-size:10px;font-weight:500}
.nav-item.active{color:#10b981}
.hidden{display:none!important}
#toast-wrap{position:fixed;top:74px;left:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1px solid;font-size:14px;transform:translateY(-8px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#6ee7b7}
.toast-error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
.toast-warning{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#fcd34d}
.toast-info{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:#93c5fd}
.filter-btn{padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;font-size:13px;color:#64748b;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif} .filter-btn.active{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:#10b981}
</style>
</head><body>
<div class="topbar">
  <a href="dashboard.html" style="color:#64748b;display:flex;align-items:center"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></a>
  <h2 style="font-size:18px;font-weight:700;flex:1">Transactions</h2>
  <span id="tx-count" style="font-size:12px;color:#334155">Loading...</span>
</div>
<div class="page">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="card" style="padding:14px"><p style="font-size:11px;color:#64748b;margin-bottom:4px">Total Deposited</p><p class="mono" style="color:#10b981;font-size:18px;font-weight:700" id="sum-dep">$0.00</p></div>
    <div class="card" style="padding:14px"><p style="font-size:11px;color:#64748b;margin-bottom:4px">Total Earned</p><p class="mono" style="color:#8b5cf6;font-size:18px;font-weight:700" id="sum-earn">$0.00</p></div>
  </div>
  <div style="overflow-x:auto;margin-bottom:14px;padding-bottom:4px">
    <div style="display:flex;gap:8px;width:max-content">
      <button class="filter-btn active" onclick="setF('')" data-f="">All</button>
      <button class="filter-btn" onclick="setF('deposit')" data-f="deposit">Deposits</button>
      <button class="filter-btn" onclick="setF('withdrawal')" data-f="withdrawal">Withdrawals</button>
      <button class="filter-btn" onclick="setF('earnings')" data-f="earnings">Earnings</button>
      <button class="filter-btn" onclick="setF('payout')" data-f="payout">Payouts</button>
    </div>
  </div>
  <div id="tx-list" class="card" style="padding:0;overflow:hidden"><div style="padding:32px;text-align:center;color:#334155;font-size:14px">Loading...</div></div>
  <div id="more-btn" class="hidden" style="text-align:center;margin-top:12px"><button onclick="loadMore()" class="btn btn-ghost" style="width:auto;padding:12px 24px">Load more</button></div>
</div>
<nav class="bottom-nav"><a href="dashboard.html" class="nav-item"><i data-lucide="home" style="width:22px;height:22px"></i><span>Home</span></a><a href="vault.html" class="nav-item"><i data-lucide="vault" style="width:22px;height:22px"></i><span>Vault</span></a><a href="deposit.html" class="nav-item"><div style="width:46px;height:46px;background:#059669;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:2px;margin-top:-18px;border:3px solid #060d1a"><i data-lucide="plus" style="width:22px;height:22px;color:white"></i></div><span>Deposit</span></a><a href="transactions.html" class="nav-item active"><i data-lucide="list" style="width:22px;height:22px"></i><span>History</span></a><a href="profile.html" class="nav-item"><i data-lucide="user" style="width:22px;height:22px"></i><span>Profile</span></a></nav>
<div id="toast-wrap"></div>
<script>

const API='https://script.google.com/macros/s/AKfycbzOh7BafxwXSmNNNn01pu-KtdXoLKqzxMiZxXsc-ETf1p7URqMooz4D1WhsgN2CjOpx/exec';
let _sess=null;
function getS(){try{return JSON.parse(sessionStorage.getItem('tp_s')||'null');}catch{return null;}}
_sess=getS();if(!_sess?.t)location.href='index.html';
async function api(a,p={}){const url=new URL(API);url.searchParams.set('action',a);url.searchParams.set('token',_sess.t);Object.entries(p).forEach(([k,v])=>url.searchParams.set(k,v));try{return await(await fetch(url)).json();}catch{return{success:false};}}
async function post(a,b){try{return await(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:a,token:_sess.t,...b})})).json();}catch{return{success:false,error:'Network error'};}}
function fmt(n,d=2){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDT(s){if(!s)return'—';return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtD(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(m,t='info',d=4000){const w=document.getElementById('toast-wrap');const el=document.createElement('div');el.className=`toast toast-${t}`;const ic={success:'check-circle',error:'x-circle',warning:'alert-triangle',info:'info'}[t];el.innerHTML=`<i data-lucide="${ic}" style="width:16px;height:16px;flex-shrink:0"></i><span>${m}</span>`;w.appendChild(el);lucide.createIcons({nodes:[el]});requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},d);}

let _all=[],_filtered=[],_page=0,_pSize=20,_activeF='';
const TI={deposit:"arrow-down-to-line",withdrawal:"arrow-up-from-line",payout:"gift",earnings:"trending-up",transfer_in:"arrow-right-left",referral_bonus:"users",adjustment:"settings"};
const TC={deposit:"#10b981",withdrawal:"#f59e0b",payout:"#8b5cf6",earnings:"#10b981",transfer_in:"#60a5fa",referral_bonus:"#ec4899"};
const CREDIT=["deposit","earnings","payout","referral_bonus"];
async function init(){
  const r=await api('getTransactions',{limit:'200'});
  if(!r.success){document.getElementById('tx-list').innerHTML='<p style="padding:24px;text-align:center;color:#ef4444">Failed to load</p>';return;}
  _all=r.transactions||[];
  let dep=0,earn=0;_all.forEach(t=>{if(t.status!=='complete')return;const a=parseFloat(t.amountUSD||t.amount||0);if(t.type==='deposit')dep+=a;if(['earnings','payout','referral_bonus'].includes(t.type))earn+=a;});
  document.getElementById('sum-dep').textContent='$'+fmt(dep);
  document.getElementById('sum-earn').textContent='$'+fmt(earn);
  applyF('');lucide.createIcons();
}
function setF(f){_activeF=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));_page=0;applyF(f);}
function applyF(f){_filtered=f?_all.filter(t=>t.type===f):[..._all];renderPage();}
function renderPage(){
  const slice=_filtered.slice(0,(_page+1)*_pSize);
  document.getElementById('tx-count').textContent=_filtered.length+' records';
  if(!_filtered.length){document.getElementById('tx-list').innerHTML='<p style="padding:24px;text-align:center;color:#334155;font-size:14px">No transactions found</p>';document.getElementById('more-btn').classList.add('hidden');return;}
  const SC={complete:'#10b981',pending:'#f59e0b',processing:'#60a5fa',failed:'#ef4444',rejected:'#ef4444'};
  document.getElementById('tx-list').innerHTML=slice.map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04)">
    <div style="width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <i data-lucide="${TI[t.type]||'circle'}" style="width:17px;height:17px;color:${TC[t.type]||'#64748b'}"></i>
    </div>
    <div style="flex:1;min-width:0">
      <p style="font-size:14px;font-weight:500;text-transform:capitalize">${(t.type||'').replace(/_/g,' ')}</p>
      <p style="font-size:11px;color:#475569">${fmtDT(t.timestamp)}</p>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <p class="mono" style="font-size:14px;font-weight:700;color:${CREDIT.includes(t.type)?'#10b981':'#f59e0b'}">${CREDIT.includes(t.type)?'+':'-'}$${fmt(t.amountUSD||t.amount)}</p>
      <p style="font-size:11px;font-weight:500;color:${SC[t.status]||'#64748b'}">${t.status}</p>
    </div>
  </div>`).join('');
  lucide.createIcons({nodes:[document.getElementById('tx-list')]});
  document.getElementById('more-btn').classList.toggle('hidden',_filtered.length<=(_page+1)*_pSize);
}
function loadMore(){_page++;renderPage();}
init();
</script></body></html>
